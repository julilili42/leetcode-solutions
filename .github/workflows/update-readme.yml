name: Update README Stats

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "assets/leetcode-difficulty.svg"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update README stats
        run: python scripts/update_readme_stats.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md assets/leetcode-difficulty.svg

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update leetcode stats"
            git push
          fi
